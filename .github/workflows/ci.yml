name: 🔄 Continuous Integration

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_VERSION: '8.2'
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '34'
  MIN_SDK_VERSION: '24'
  COMPILE_SDK_VERSION: '34'
  TARGET_SDK_VERSION: '34'

jobs:
  # ==================== CHECKOUT & SETUP ====================
  setup:
    name: 📦 Setup Environment
    runs-on: ubuntu-latest
    outputs:
      build-number: ${{ steps.build-number.outputs.value }}
      version-name: ${{ steps.version.outputs.value }}
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Generate build number
        id: build-number
        run: |
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER + 1000))
          echo "value=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build Number: $BUILD_NUMBER"

      - name: 🏷️ Get version
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: 📝 Display build info
        run: |
          echo "=== Build Information ==="
          echo "Build Number: ${{ steps.build-number.outputs.value }}"
          echo "Version: ${{ steps.version.outputs.value }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

  # ==================== GRADLE BUILD ====================
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties

      - name: 🔨 Build with Gradle
        run: ./gradlew build -x test \
          -Pandroid.useAndroidX=true \
          -Pandroid.enableJetifier=true \
          --no-daemon \
          --parallel \
          --build-cache

      - name: 📤 Upload build reports
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: build-reports-${{ matrix.api-level }}
          path: app/build/reports/

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f app/keystore.jks
          rm -f local.properties

  # ==================== UNIT TESTS ====================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    
    strategy:
      matrix:
        java-version: [ '17', '21' ]
      fail-fast: false

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🧪 Run unit tests
        run: ./gradlew test \
          --no-daemon \
          --parallel \
          -Pandroid.useAndroidX=true

      - name: 📊 Generate test report
        if: always()
        run: ./gradlew testReport

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results-jdk${{ matrix.java-version }}
          path: |
            app/build/reports/tests/
            build/reports/

      - name: 📝 Publish test report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/TEST-*.xml'
          check_name: 🧪 Unit Test Results (JDK ${{ matrix.java-version }})
          comment_mode: always

  # ==================== INSTRUMENTED TESTS ====================
  instrumented-tests:
    name: 📱 Instrumented Tests
    runs-on: ubuntu-latest
    needs: setup
    
    strategy:
      matrix:
        api-level: [ 29, 31, 34 ]
      fail-fast: false

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🤖 Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: Pixel_5
          ram-size: 2048M
          disk-size: 2048M
          script: ./gradlew connectedAndroidTest --no-daemon
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none

      - name: 📤 Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/

  # ==================== LINT & CODE QUALITY ====================
  lint:
    name: 🔍 Lint Analysis
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🔍 Run Android Lint
        run: ./gradlew lint --no-daemon --continue

      - name: 📤 Upload lint reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lint-reports
          path: app/build/reports/lint-results*.html

      - name: 📊 Parse and comment lint results
        if: always()
        uses: android-actions/lint-reporter@v1
        with:
          report-path: app/build/reports/lint-results-debug.xml

  # ==================== DETEKT ANALYSIS ====================
  detekt:
    name: 🎯 Detekt Code Analysis
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🎯 Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: 📊 Detekt Report
        uses: rweich/detekt-report-action@v1
        if: always()
        with:
          sarif_report_paths: app/build/reports/detekt/detekt.sarif
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: detekt-reports
          path: app/build/reports/detekt/

  # ==================== KTLINT ====================
  ktlint:
    name: 🎨 Kotlin Lint
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🎨 Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: 📤 Upload ktlint reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ktlint-reports
          path: app/build/reports/ktlint/

  # ==================== DEPENDENCY CHECK ====================
  dependency-check:
    name: 🔐 Dependency Vulnerability Check
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🔐 Run dependency check
        run: ./gradlew dependencyCheckAnalyze --no-daemon || true

      - name: 📤 Upload dependency reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-reports
          path: app/build/reports/dependency-check/

  # ==================== CODE COVERAGE ====================
  code-coverage:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    needs: [ unit-tests, instrumented-tests ]

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 📊 Generate coverage report
        run: ./gradlew jacocoTestDebugUnitTestReport --no-daemon

      - name: ⬆️ Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./app/build/reports/jacoco/jacocoTestDebugUnitTestReport/jacocoTestDebugUnitTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: 📤 Upload coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: code-coverage-reports
          path: app/build/reports/jacoco/

  # ==================== BUILD STATUS ====================
  build-status:
    name: ✅ Build Status
    runs-on: ubuntu-latest
    needs: [ build, unit-tests, lint, detekt ]
    if: always()

    steps:
      - name: ✅ Check build status
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.detekt.result }}" == "failure" ]; then
            echo "❌ CI Pipeline Failed!"
            exit 1
          else
            echo "✅ CI Pipeline Passed!"
          fi

      - name: 🎉 Success notification
        if: success()
        run: echo "✅ All checks passed successfully!"
        
