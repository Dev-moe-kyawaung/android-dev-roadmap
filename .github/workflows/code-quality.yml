name: 🛡️ Code Quality & Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * 0'  # Weekly

env:
  GRADLE_VERSION: '8.2'
  JAVA_VERSION: '17'

jobs:
  # ==================== SONARQUBE ANALYSIS ====================
  sonarqube:
    name: 🔍 SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🧪 Run tests
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: 🔍 SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: ./gradlew sonarqube \
          -Dsonar.projectKey=android-dev-roadmap \
          -Dsonar.sources=app/src/main/kotlin \
          -Dsonar.tests=app/src/test/kotlin \
          -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml \
          --no-daemon

  # ==================== SECURITY SCANNING ====================
  security-scan:
    name: 🔐 Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: 🔐 Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/kotlin

  # ==================== DEPENDENCY VULNERABILITIES ====================
  dependency-vulnerabilities:
    name: 📦 Dependency Vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🔍 Check dependencies with OWASP
        run: ./gradlew dependencyCheckAnalyze --no-daemon || true

      - name: 📤 Upload OWASP report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dependency-check-report
          path: app/build/reports/dependency-check/

  # ==================== STATIC ANALYSIS ====================
  static-analysis:
    name: 🔎 Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🔎 Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: 📤 Upload Detekt SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: 'detekt'

      - name: 🎨 Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: 🔍 Run Android Lint
        run: ./gradlew lint --no-daemon

  # ==================== CODE STYLE ====================
  code-style:
    name: 🎨 Code Style Checks
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🎨 Check code formatting
        run: ./gradlew ktlintFormat --no-daemon

      - name: 📝 Suggest corrections
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Code style issues found. Run `./gradlew ktlintFormat` to fix.'
            })
            
