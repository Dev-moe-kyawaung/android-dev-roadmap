name: 🧪 Advanced Testing Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  GRADLE_VERSION: '8.2'
  JAVA_VERSION: '17'

jobs:
  # ==================== UNIT TESTS WITH COVERAGE ====================
  unit-tests-coverage:
    name: 🧪 Unit Tests with Coverage
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🧪 Run tests with coverage
        run: ./gradlew test jacocoTestReport \
          --no-daemon \
          --parallel

      - name: 📊 Generate coverage badge
        uses: actions/upload-artifact@v3
        with:
          name: coverage-badge
          path: app/build/reports/jacoco/

  # ==================== INSTRUMENTED TESTS (MULTIPLE DEVICES) ====================
  instrumented-tests-matrix:
    name: 📱 Instrumented Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - api-level: 24
            arch: x86
            profile: "Nexus 5X"
            target: "google_apis"
          - api-level: 29
            arch: x86
            profile: "Pixel 3a"
            target: "google_apis"
          - api-level: 31
            arch: x86_64
            profile: "Pixel 4a"
            target: "google_apis"
          - api-level: 34
            arch: x86_64
            profile: "Pixel 5"
            target: "google_apis"
      fail-fast: false

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🤖 Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.profile }}
          target: ${{ matrix.target }}
          ram-size: 2048M
          disk-size: 2048M
          heap-size: 512M
          script: |
            adb logcat > logcat.log &
            ./gradlew connectedAndroidTest --no-daemon

      - name: 📤 Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: instrumented-tests-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected/
            logcat.log

  # ==================== UI TESTS (ESPRESSO) ====================
  ui-tests:
    name: 🎨 UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🎨 Run UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86
          profile: "Pixel 3a"
          ram-size: 2048M
          disk-size: 2048M
          script: |
            ./gradlew connectedAndroidTest -Pandroid.testInstrumentation.debugBuildType=debug \
              --no-daemon

      - name: 📤 Upload UI test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ui-test-results
          path: app/build/reports/androidTests/

  # ==================== PERFORMANCE TESTS ====================
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: ⚡ Run performance benchmarks
        run: ./gradlew :app:managedDevices:testDemoDebug \
          --no-daemon

      - name: 📤 Upload performance results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-results
          path: app/build/outputs/managed_device_android_test_additional_output/

  # ==================== SNAPSHOT TESTS ====================
  snapshot-tests:
    name: 📸 Snapshot Tests
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 📸 Run snapshot tests
        run: ./gradlew testDebugUnitTest -x detekt \
          --no-daemon

      - name: 📤 Upload snapshot diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: snapshot-diffs
          path: app/build/reports/tests/testDebugUnitTest/

  # ==================== TEST REPORT ====================
  test-report:
    name: 📊 Generate Test Report
    runs-on: ubuntu-latest
    needs: [ unit-tests-coverage, instrumented-tests-matrix, ui-tests ]
    if: always()

    steps:
      - name: 📥 Download all test results
        uses: actions/download-artifact@v3

      - name: 📊 Publish combined test report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/TEST-*.xml'
          check_name: '📊 All Test Results'
          
